server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/inventory_db
spring.datasource.username=root
spring.datasource.password=WJ28@krhp

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.datasource.hikari.pool-name=InventoryPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Redis (distributed cache)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Kafka (producer + consumer)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=com.inventory.*
spring.kafka.consumer.properties.spring.json.value.default.type=com.inventory.event.InventoryEvent
spring.kafka.listener.missing-topics-fatal=false

# Application Kafka topic
app.kafka.topic=inventory-history-events
app.kafka.group-id=inventory-history-group
app.kafka.partitions=1
app.kafka.replicas=1

# Cache tuning
app.cache.redis.ttl-seconds=600
app.cache.lru.max-size=500
app.cache.caffeine.max-size=500
app.cache.caffeine.ttl-seconds=300